<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leaflet Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([37.5665, 126.9780], 13);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let startMarker = null;
    let endMarker = null;
    let polylineGroup = L.layerGroup().addTo(map);
    let clickCount = 0;

    document.addEventListener("message", function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.type === "drawRoute") {
          polylineGroup.clearLayers();

          const coords = data.coordinates;
          const waytypes = data.waytypes;

          for (let i = 0; i < coords.length - 1; i++) {
            const latlng1 = [coords[i][1], coords[i][0]];
            const latlng2 = [coords[i + 1][1], coords[i + 1][0]];
            const color = (waytypes[i] === 6) ? "green" : "blue";

            const segment = L.polyline([latlng1, latlng2], {
              color: color,
              weight: 4,
            });

            polylineGroup.addLayer(segment);
          }

          map.fitBounds(polylineGroup.getBounds());
        }
      } catch (e) {
        console.error("메시지 파싱 오류:", e);
      }
    });

    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;

      clickCount++;
      if (clickCount === 1) {
        if (startMarker) {
          startMarker.setLatLng(e.latlng);
        } else {
          startMarker = L.marker(e.latlng, { title: "출발지" }).addTo(map);
        }
      } else if (clickCount === 2) {
        if (endMarker) {
          endMarker.setLatLng(e.latlng);
        } else {
          endMarker = L.marker(e.latlng, { title: "도착지" }).addTo(map);
        }
      } else {
        if (startMarker) {
          startMarker.setLatLng(e.latlng);
        } else {
          startMarker = L.marker(e.latlng, { title: "출발지" }).addTo(map);
        }
        if (endMarker) {
          map.removeLayer(endMarker);
          endMarker = null;
        }
        polylineGroup.clearLayers();
        clickCount = 1;
      }

      window.ReactNativeWebView.postMessage(JSON.stringify({
        type: 'mapClick',
        lat: lat,
        lng: lng,
        clickCount: clickCount
      }));
    });
  </script>
</body>
</html>
