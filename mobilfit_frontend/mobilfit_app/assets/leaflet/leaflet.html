
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MobilFit 자전거 경로 지도</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@here/harp-flexible-polyline/dist/flexiblepolyline.min.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .leaflet-container {
      background: #f8f9fa;
    }
    .leaflet-control-zoom {
      display: none !important;
    }
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.8) !important;
      backdrop-filter: blur(10px) !important;
      border-radius: 4px !important;
      margin: 10px !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = L.map('map').setView([37.5665, 126.9780], 13);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap | MobilFit'
    }).addTo(map);

    let startMarker = null;
    let endMarker = null;
    let polylineGroup = L.layerGroup().addTo(map);
    let crossingGroup = L.layerGroup().addTo(map);
    let clickCount = 0;
    let isSearchingRoute = false;
    let isRouteFixed = false;
    let chunkedCoords = [];
    let chunkedWaytypes = [];

    const startIcon = L.icon({
      iconUrl: 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41"><path fill="#4CAF50" stroke="#ffffff" stroke-width="2" d="M12.5,0C5.596,0,0,5.596,0,12.5c0,12.5,12.5,28.5,12.5,28.5s12.5-16,12.5-28.5C25,5.596,19.404,0,12.5,0z"/><circle fill="#ffffff" cx="12.5" cy="12.5" r="6"/></svg>`),
      iconSize: [20, 33], iconAnchor: [10, 33], popupAnchor: [1, -28]
    });

    const endIcon = L.icon({
      iconUrl: 'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 41"><path fill="#FF5722" stroke="#ffffff" stroke-width="2" d="M12.5,0C5.596,0,0,5.596,0,12.5c0,12.5,12.5,28.5,12.5,28.5s12.5-16,12.5-28.5C25,5.596,19.404,0,12.5,0z"/><circle fill="#ffffff" cx="12.5" cy="12.5" r="6"/></svg>`),
      iconSize: [20, 33], iconAnchor: [10, 33], popupAnchor: [1, -28]
    });

    function handleMessage(event) {
      try {
        let data = event.data;
        if (typeof data === "string") data = JSON.parse(data);

        if (data.type === "drawRoute") {
          chunkedCoords = [];
          chunkedWaytypes = [];
          polylineGroup.clearLayers();
          const coordinates = data.coordinates, waytypes = data.waytypes;
          for (let i = 0; i < coordinates.length - 1; i++) {
            const [lng1, lat1] = coordinates[i], [lng2, lat2] = coordinates[i+1];
            const color = waytypes[i] === 6 ? "#4CAF50" : "#2196F3";
            const weight = waytypes[i] === 6 ? 6 : 4;
            polylineGroup.addLayer(L.polyline([[lat1, lng1], [lat2, lng2]], { color, weight, opacity: 0.8 }));
          }
          map.fitBounds(L.latLngBounds(coordinates.map(([lng, lat]) => [lat, lng])));
          isRouteFixed = true;
        } else if (data.type === "drawRouteChunk") {
          chunkedCoords.push(...(data.coordinates || []).map(([lng, lat]) => [lat, lng]));
          chunkedWaytypes.push(...(data.waytypes || []));
        } else if (data.type === "drawRouteComplete") {
          polylineGroup.clearLayers();
          for (let i = 0; i < chunkedCoords.length - 1; i++) {
            const [lat1, lng1] = chunkedCoords[i], [lat2, lng2] = chunkedCoords[i+1];
            const color = chunkedWaytypes[i] === 6 ? "#4CAF50" : "#2196F3";
            const weight = chunkedWaytypes[i] === 6 ? 6 : 4;
            polylineGroup.addLayer(L.polyline([[lat1, lng1], [lat2, lng2]], { color, weight, opacity: 0.8 }));
          }
          if (chunkedCoords.length) map.fitBounds(L.latLngBounds(chunkedCoords));
          isRouteFixed = true;
          chunkedCoords = [];
          chunkedWaytypes = [];
        } else if (data.type === "drawCrossings") {
          crossingGroup.clearLayers();
          data.crossings.forEach(({ lat, lng }) => {
            const icon = L.divIcon({
              className: 'traffic-light-marker',
              html: `<div style="background:linear-gradient(135deg,#2c3e50 0%,#34495e 100%);color:white;width:12px;height:20px;border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:space-around;border:1px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);padding:1px;"><div style="width:5px;height:5px;background:#e74c3c;border-radius:50%;"></div><div style="width:5px;height:5px;background:#f39c12;border-radius:50%;"></div><div style="width:5px;height:5px;background:#27ae60;border-radius:50%;"></div></div>`,
              iconSize: [14, 22], iconAnchor: [7, 22]
            });
            L.marker([lat, lng], { icon }).addTo(crossingGroup);
          });
        } else if (data.type === "clearRoute") {
          polylineGroup.clearLayers();
          crossingGroup.clearLayers();
          if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
          if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
          clickCount = 0;
          isRouteFixed = false;
          isSearchingRoute = false;
          chunkedCoords = [];
          chunkedWaytypes = [];
        } else if (data.type === "setSearching") {
          isSearchingRoute = data.value;
          console.log("[DEBUG] setSearching 수신됨:", isSearchingRoute);
        }
      } catch (e) {
        console.error("메시지 처리 오류:", e);
      }
    }

    // Android용 메시지 수신
    document.addEventListener("message", handleMessage);
    // iOS용 메시지 수신
    window.addEventListener("message", handleMessage);

    map.on("click", function(e) {
      if (isRouteFixed || isSearchingRoute) {
        console.log("❌ 클릭 차단됨");
        return;
      }
      const lat = e.latlng.lat, lng = e.latlng.lng;
      clickCount++;
      if (clickCount === 1) {
        startMarker?.setLatLng(e.latlng) || (startMarker = L.marker(e.latlng, { icon: startIcon }).addTo(map));
      } else if (clickCount === 2) {
        endMarker?.setLatLng(e.latlng) || (endMarker = L.marker(e.latlng, { icon: endIcon }).addTo(map));
      } else {
        startMarker?.setLatLng(e.latlng) || (startMarker = L.marker(e.latlng, { icon: startIcon }).addTo(map));
        if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
        polylineGroup.clearLayers();
        crossingGroup.clearLayers();
        clickCount = 1;
      }
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: "mapClick", lat, lng, clickCount }));
    });
  </script>
</body>
</html>
