version: '3.8'

services:
    db:
        image: postgres:15
        container_name: mobilfit_db
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data

    web:
        build: .
        container_name: mobilfit_web
        restart: always
        env_file:
            - .env
        entrypoint: ./entrypoint.sh
        volumes:
            - .:/app
        depends_on:
            - db

    nginx:
        image: nginx:latest
        container_name: mobilfit_nginx
        ports:
            - "127.0.0.1:8001:80"
        volumes:
            - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
            - ./mobilfit_backend/staticfiles:/app/mobilfit_backend/staticfiles
        depends_on:
            - web

volumes:
    pgdata: