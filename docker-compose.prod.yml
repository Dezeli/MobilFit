version: '3.8'

services:
    db:
        image: postgres:15
        container_name: mobilfit_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - pgdata:/var/lib/postgresql/data

    web:
        build: .
        container_name: mobilfit_web
        restart: unless-stopped
        env_file:
            - .env
        entrypoint: ./entrypoint.sh
        volumes:
            - .:/app
            - media_data:/app/mobilfit_backend/media
        depends_on:
            - db
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
            - net.ipv6.conf.default.disable_ipv6=1

    nginx:
        image: nginx:latest
        container_name: mobilfit_nginx
        restart: unless-stopped
        ports:
            - "127.0.0.1:8001:80"
        volumes:
            - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
            - ./mobilfit_backend/staticfiles:/app/mobilfit_backend/staticfiles:ro
            - media_data:/app/mobilfit_backend/media:ro
        depends_on:
            - web

volumes:
    pgdata:
    media_data:
