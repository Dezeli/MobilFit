<!-- templates/account_deletion.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Mobilfit</title>
  {% load static %}
  <link rel="icon" href="{% static 'images/icon.png' %}" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'system-ui', sans-serif;
      background-color: #FAFAFA;
      padding: 20px;
      max-width: 720px;
      margin: auto;
    }
    h1 {
      color: #2C3E50;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p.description {
      font-size: 14px;
      color: #555;
      margin-bottom: 24px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
      font-weight: 600;
      color: #2C3E50;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 24px;
      width: 100%;
      background: linear-gradient(to right, #52C41A, #73D13D);
      color: white;
      font-weight: bold;
      font-size: 16px;
      border: none;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .errorlist {
      color: #d32f2f;
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>계정 및 데이터 삭제 요청</h1>
  <p class="description">
    계정 삭제를 원하시면 아래 정보를 입력해 주세요. 요청은 검토 후 30일 이내 처리되며, 이메일로 결과를 안내해드립니다.
  </p>

  <form method="post">
    {% csrf_token %}

    <label for="id_email">이메일 주소</label>
    {{ form.email }}

    <label for="id_message">삭제 요청 내용</label>
    {{ form.message }}

    <button type="submit">요청 제출</button>
  </form>
</body>
</html>
